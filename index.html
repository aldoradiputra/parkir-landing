<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupaPark — Brand Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;color:#F5F5F0;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
a{color:#F5A623;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);border-bottom:.5px solid rgba(255,255,255,.06);display:flex;align-items:center;overflow-x:auto;padding:0 16px;-webkit-overflow-scrolling:touch}
.nav-brand{display:flex;align-items:center;gap:8px;padding:12px 16px 12px 0;flex-shrink:0}
.nav-brand span{font-weight:700;letter-spacing:.12em;font-size:13px;color:#F5A623}
.nav-sep{width:1px;height:24px;background:rgba(255,255,255,.08);flex-shrink:0}
.nav-tabs{display:flex;gap:0;overflow-x:auto;flex-shrink:1}
.nav-tab{background:none;border:none;cursor:pointer;padding:14px;white-space:nowrap;font-size:12px;font-weight:400;color:#666660;border-bottom:2px solid transparent;font-family:inherit;transition:all 150ms}
.nav-tab.active{font-weight:600;color:#F5A623;border-bottom-color:#F5A623}
.nav-lang{margin-left:auto;flex-shrink:0;padding:0 8px}
.nav-lang button{background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.12);border-radius:6px;padding:6px 10px;color:#A3A39A;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.content{max-width:960px;margin:0 auto;padding:0 24px 80px}
.section-title{padding:56px 0 32px}
.section-title h2{font-size:28px;font-weight:700;color:#F5F5F0;line-height:1.2}
.section-title p{font-size:14px;color:#A3A39A;margin-top:8px;line-height:1.6}
.card{background:#111;border:.5px solid rgba(255,255,255,.06);border-radius:12px;padding:20px 24px}
.card-glow{box-shadow:0 0 40px rgba(245,166,35,.08)}
.label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#666660;margin-bottom:10px}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mono{font-family:'JetBrains Mono','Courier New',monospace}
.amber{color:#F5A623}
.green{color:#22C55E}
.red{color:#EF4444}
.blue{color:#3B82F6}
.muted{color:#A3A39A}
.hint{color:#666660}
.divider{border-bottom:.5px solid rgba(255,255,255,.06);padding:10px 0}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-center{display:flex;align-items:center;justify-content:center}
.text-center{text-align:center}
.mb-16{margin-bottom:16px}
.mb-24{margin-bottom:24px}
.mt-32{margin-top:32px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{padding:12px 14px;text-align:left;font-size:11px;font-weight:600;color:#666660;text-transform:uppercase;letter-spacing:.06em;border-bottom:.5px solid rgba(255,255,255,.08)}
.data-table td{padding:10px 14px;border-bottom:.5px solid rgba(255,255,255,.06)}
.btn{border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:600}
.btn-amber{background:#F5A623;color:#0A0A0A}
.btn-red{background:#EF4444;color:#fff}
.btn-secondary{background:transparent;border:.5px solid rgba(255,255,255,.12);color:#A3A39A}
.btn-ghost{background:transparent;color:#A3A39A;border:none}
.booth-btn{background:transparent;border:.5px solid rgba(255,255,255,.12);border-radius:6px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#A3A39A;font-family:inherit;text-transform:capitalize}
.booth-btn.active{background:#F5A623;color:#0A0A0A;border-color:#F5A623}
@media(max-width:768px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.nav-tabs{overflow-x:auto}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 48 48" fill="none"><rect x="10" y="8" width="10" height="32" rx="3" fill="#F5A623"/><path d="M20 8h10a10 10 0 0 1 0 20H20" stroke="#F5A623" stroke-width="8" stroke-linecap="round" fill="none"/></svg>
    <span>SUPAPARK</span>
  </div>
  <div class="nav-sep"></div>
  <div class="nav-tabs" id="tabs"></div>
  <div class="nav-lang"><button id="langBtn" onclick="toggleLang()">EN</button></div>
</nav>
<div class="content" id="content"></div>
<script>
const L=(s=40,c='#F5A623')=>`<svg width="${s}" height="${s}" viewBox="0 0 48 48" fill="none"><rect x="10" y="8" width="10" height="32" rx="3" fill="${c}"/><path d="M20 8h10a10 10 0 0 1 0 20H20" stroke="${c}" stroke-width="8" stroke-linecap="round" fill="none"/></svg>`;
let cur='cover',lang='en';
const secs=[{id:'cover',n:'Cover'},{id:'mission',n:'Mission & Problem'},{id:'identity',n:'Brand Identity'},{id:'logo',n:'Logo System'},{id:'colors',n:'Color Palette'},{id:'typography',n:'Typography'},{id:'booth',n:'Booth UI'},{id:'dashboard',n:'Dashboard UI'},{id:'voice',n:'Brand Voice'},{id:'gtm',n:'Go-to-Market'},{id:'timeline',n:'Launch Timeline'}];
function toggleLang(){lang=lang==='en'?'id':'en';document.getElementById('langBtn').textContent=lang.toUpperCase();render()}
function nav(id){cur=id;document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));render()}
const te=document.getElementById('tabs');secs.forEach(s=>{const b=document.createElement('button');b.className='nav-tab'+(s.id==='cover'?' active':'');b.dataset.id=s.id;b.textContent=s.n;b.onclick=()=>nav(s.id);te.appendChild(b)});
function t(e,i){return lang==='en'?e:i}
function render(){const el=document.getElementById('content');el.innerHTML=R[cur]?R[cur]():'';if(cur==='booth')setBoothState('payment')}
const R={
cover:()=>`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;text-align:center">${L(80)}<h1 style="font-size:56px;font-weight:700;letter-spacing:.15em;margin-top:24px;background:linear-gradient(180deg,#F5F5F0 30%,#F5A623 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent">SUPAPARK</h1><p style="font-size:13px;font-weight:600;letter-spacing:.2em;color:#A3A39A;margin-top:8px;text-transform:uppercase">Smart Parking System</p><div style="width:48px;height:1px;background:#F5A623;margin:32px 0;opacity:.5"></div><p style="font-size:16px;color:#A3A39A;max-width:480px;line-height:1.7">${t('Brand Book & Visual Identity System — A comprehensive guide to the SupaPark brand, from visual identity to go-to-market strategy.','Buku Brand & Sistem Identitas Visual — Panduan lengkap brand SupaPark, dari identitas visual hingga strategi go-to-market.')}</p><p style="font-size:12px;color:#666660;margin-top:40px">v1.0 — 2025</p></div>`,
mission:()=>`<div class="section-title"><h2>${t('Mission & Problem','Misi & Masalah')}</h2><p>${t("What's broken in existing systems — and how SupaPark fixes all of it.","Apa yang rusak dari sistem yang ada — dan bagaimana SupaPark memperbaikinya.")}</p></div><div class="card card-glow text-center mb-24" style="padding:32px 24px"><div class="label">${t('Core Value Proposition','Proposisi Nilai Utama')}</div><p style="font-size:24px;font-weight:700;color:#F5A623;margin:4px 0 8px;line-height:1.3">${t('Prevent Leakage, Maximize Revenue.','Cegah Kebocoran, Maksimalkan Pendapatan.')}</p><p class="muted" style="font-size:14px;max-width:500px;margin:0 auto">${t('Replace expensive enterprise parking with an affordable, ticketless, offline-first system. The license plate IS the ticket.','Ganti sistem parkir enterprise yang mahal dengan sistem terjangkau, tanpa tiket, dan offline-first. Plat nomor ADALAH tiketnya.')}</p></div><div class="label">${t('Problems We Solve','Masalah yang Kami Selesaikan')}</div><div class="grid3 mb-24">${[{i:'🔒',t:'Vendor Lock-in',d:'Proprietary booths Rp 50–150jt/lane. Operators hostage for repairs.'},{i:'🎫',t:'Ticket Fraud',d:'Paper tickets lost, cash pocketed, reconciliation impossible.'},{i:'📡',t:'No Offline',d:'Cloud-dependent systems fail when internet drops.'},{i:'💰',t:'Overpriced SaaS',d:'Enterprise licenses unaffordable for ruko, kos, kampus.'},{i:'👤',t:'Staff Dependency',d:'Staffing is the biggest cost and fraud vector.'},{i:'📊',t:'Zero Visibility',d:'Operators have no live data on revenue or occupancy.'}].map(p=>`<div class="card" style="padding:16px 18px"><div style="font-size:20px;margin-bottom:8px">${p.i}</div><div style="font-size:14px;font-weight:600;color:#F5F5F0;margin-bottom:4px">${p.t}</div><div style="font-size:12px;color:#A3A39A;line-height:1.5">${p.d}</div></div>`).join('')}</div><div class="label">Target Segments</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px">${['Ruko / Kos','Kampus Swasta','RS / Klinik','Perkantoran','Mall','Pasar / UMKM'].map(s=>`<span class="pill" style="background:#F5A62318;color:#F5A623">${s}</span>`).join('')}</div><div class="label">Staffing Modes</div><div class="grid3">${[{m:'Unattended',d:'Ruko, kos — fully automated',c:'#22C55E'},{m:'Attended',d:'Mall, RS, pasar — tablet overrides',c:'#F5A623'},{m:'Hybrid',d:'Kampus — staffed at peak only',c:'#3B82F6'}].map(x=>`<div class="card" style="border-left:3px solid ${x.c};padding:14px 16px"><div style="font-size:14px;font-weight:600;color:${x.c}">${x.m}</div><div style="font-size:12px;color:#A3A39A;margin-top:4px">${x.d}</div></div>`).join('')}</div>`,
identity:()=>`<div class="section-title"><h2>Brand Identity</h2><p>The personality, mental models, and design references that define SupaPark.</p></div><div class="card card-glow text-center mb-24" style="padding:28px 24px"><div class="label">Brand Concept</div><p style="font-size:22px;font-weight:700;color:#F5A623">"Operational Authority"</p><p class="muted" style="font-size:13px;margin-top:8px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.6">SupaPark handles money, controls physical gates, and runs 24/7 outdoors. The design must say: <em style="color:#F5F5F0">this works, it's reliable, trust it with your money.</em></p></div><div class="label">Brand Attributes</div><div class="grid2 mb-24">${[{n:'Operational Authority',d:'Handles money and security. Robust, industrial, unfailing.',i:'⚙️'},{n:'Accessible High-Tech',d:'ANPR, AI, IoT — made simple and affordable.',i:'🧠'},{n:'Unstoppable',d:'Built for heat, rain, spotty internet. Offline-first.',i:'🛡️'},{n:'Transparent',d:'No hidden fees. What the owner sees is what they get.',i:'👁️'}].map(a=>`<div class="card" style="padding:16px 18px"><div style="font-size:18px;margin-bottom:6px">${a.i}</div><div style="font-size:14px;font-weight:600;color:#F5F5F0">${a.n}</div><div style="font-size:12px;color:#A3A39A;margin-top:4px;line-height:1.5">${a.d}</div></div>`).join('')}</div><div class="grid2"><div><div class="label">Reference Mental Models</div>${[{n:'Grab Mitra',d:'Clear, high-contrast, functional'},{n:'Airport Gate Signage',d:'Readable at a glance, zero ambiguity'},{n:'Industrial Control Panel',d:'Status is always obvious'},{n:'Bloomberg Terminal',d:'Dark, dense, authoritative data'}].map(r=>`<div class="divider"><div style="font-size:13px;font-weight:600;color:#F5F5F0">${r.n}</div><div style="font-size:12px;color:#666660">${r.d}</div></div>`).join('')}</div><div><div class="label">What SupaPark is NOT</div>${['Consumer lifestyle app','Generic SaaS dashboard','Cute or playful UI','Heavy enterprise gray'].map(n=>`<div class="divider" style="display:flex;align-items:center;gap:10px"><span style="color:#EF4444;font-size:14px;font-weight:700">✕</span><span style="font-size:13px;color:#A3A39A">${n}</span></div>`).join('')}</div></div>`,
logo:()=>`<div class="section-title"><h2>Logo System</h2><p>The SupaPark logomark, wordmark, and lockup — designed for recognition at every scale.</p></div><div class="card card-glow text-center mb-16" style="padding:48px 24px"><div class="label">Primary Lockup — Dark Background</div><div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px">${L(52)}<span style="font-size:36px;font-weight:700;letter-spacing:.15em;color:#F5F5F0">SUPAPARK</span></div><p class="hint" style="margin-top:16px;font-size:12px">Logomark + Wordmark — 8px gap, vertically centered</p></div><div class="grid2 mb-24"><div class="card text-center" style="padding:40px 24px;background:#F5F5F0"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#666;margin-bottom:10px">Light Background</div><div style="display:flex;align-items:center;justify-content:center;gap:12px">${L(36,'#1A1A1A')}<span style="font-size:24px;font-weight:700;letter-spacing:.15em;color:#1A1A1A">SUPAPARK</span></div></div><div class="card text-center" style="padding:40px 24px"><div class="label">Monochrome / Booth</div><div style="display:flex;align-items:center;justify-content:center;gap:12px">${L(36,'#FFF')}<span style="font-size:24px;font-weight:700;letter-spacing:.15em;color:#FFF">SUPAPARK</span></div></div></div><div class="label">Logomark Construction</div><div class="card mb-24"><div class="grid2"><div class="flex-center">${L(100)}</div><div><p style="font-size:14px;font-weight:600;color:#F5F5F0;margin-bottom:8px">The Barrier Gate "P"</p><p style="font-size:13px;color:#A3A39A;line-height:1.6">A stylized <strong style="color:#F5A623">P</strong> where the vertical stroke is the gate post and the curve is the barrier arm in the raised position. The "P" anchors the "Park" in SupaPark.</p><div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap"><span class="pill" style="background:#F5A62318;color:#F5A623">Min size: 24px</span><span class="pill" style="background:#052E1620;color:#22C55E">Rounded rect + arc</span></div></div></div></div><div class="label">Naming Convention</div><div class="grid2">${[{c:'Booth Screen Header',v:'SUPAPARK + [Location]'},{c:'Dashboard Tab',v:'SupaPark — [Location]'},{c:'WhatsApp Sender',v:'SupaPark [Location]'},{c:'Receipt Header',v:'SUPAPARK bold + location'}].map(n=>`<div class="divider"><div style="font-size:11px;font-weight:600;color:#666660;text-transform:uppercase;letter-spacing:.08em">${n.c}</div><div class="mono" style="font-size:13px;color:#F5F5F0;margin-top:2px">${n.v}</div></div>`).join('')}</div>`,
colors:()=>{const g=[{g:'Dark Foundation',c:[{n:'Base',h:'#0A0A0A',d:'Deepest background'},{n:'Raised',h:'#111111',d:'Cards, panels'},{n:'Overlay',h:'#1A1A1A',d:'Modals, dropdowns'},{n:'Elevated',h:'#222222',d:'Hover states'}]},{g:'Primary — Amber',c:[{n:'Amber',h:'#F5A623',d:'Primary CTA'},{n:'Bright',h:'#FFB830',d:'Hover'},{n:'Dim',h:'#B57A18',d:'Pressed'},{n:'Subtle',h:'#2A1F08',d:'Tint'}]},{g:'Status Colors',c:[{n:'Green',h:'#22C55E',d:'Success'},{n:'Red',h:'#EF4444',d:'Error'},{n:'Blue',h:'#3B82F6',d:'Info'}]},{g:'Booth — Ultra Contrast',c:[{n:'BG',h:'#000000',d:'Pure black'},{n:'Text',h:'#FFFFFF',d:'Pure white'},{n:'Green',h:'#00FF88',d:'Neon confirm'},{n:'Red',h:'#FF3B3B',d:'Bright error'}]}];let h='<div class="section-title"><h2>Color Palette</h2><p>Built for outdoor readability, dark surfaces, and instant status recognition.</p></div>';g.forEach(x=>{h+=`<div style="margin-bottom:28px"><div class="label">${x.g}</div><div style="display:grid;grid-template-columns:repeat(${Math.min(x.c.length,4)},1fr);gap:12px">`;x.c.forEach(c=>{const bd=(c.h==='#0A0A0A'||c.h==='#000000')?'border:1px solid rgba(255,255,255,.08)':'';h+=`<div class="card" style="padding:0;overflow:hidden"><div style="height:72px;background:${c.h};${bd}"></div><div style="padding:12px 14px"><div style="font-size:13px;font-weight:600;color:#F5F5F0">${c.n}</div><div class="mono" style="font-size:12px;color:#A3A39A">${c.h}</div><div style="font-size:11px;color:#666660;margin-top:2px">${c.d}</div></div></div>`});h+='</div></div>'});h+=`<div class="label">Color Usage Rules</div><div class="card">`;[{c:'#F5A623',n:'Amber',r:'Primary actions, gate controls. Never informational.'},{c:'#22C55E',n:'Green',r:'Confirmed payment, valid member. Only when done.'},{c:'#EF4444',n:'Red',r:'Gate stuck, errors. Never decorative.'},{c:'#3B82F6',n:'Blue',r:'Info, links, neutral badges. Never primary.'}].forEach(r=>{h+=`<div class="divider" style="display:flex;align-items:flex-start;gap:12px"><div style="width:12px;height:12px;border-radius:50%;background:${r.c};flex-shrink:0;margin-top:3px"></div><div><span style="font-size:13px;font-weight:600;color:${r.c}">${r.n}</span><span style="font-size:13px;color:#A3A39A"> — ${r.r}</span></div></div>`});h+='</div>';return h},
typography:()=>`<div class="section-title"><h2>Typography</h2><p>Two fonts. One for UI, one for plates. Zero ambiguity at any distance.</p></div><div class="grid2 mb-24"><div class="card card-glow" style="padding:28px 24px"><div class="label">Primary — UI Font</div><p style="font-size:32px;font-weight:700;color:#F5F5F0;margin:8px 0 4px">Plus Jakarta Sans</p><p style="font-size:13px;color:#A3A39A;line-height:1.6">All titles, buttons, body copy. Modern, Indonesian roots. 100% sans-serif.</p><div style="margin-top:16px"><span style="font-size:14px;font-weight:600;color:#F5F5F0">Aa Bb Cc 0123</span><span style="font-size:14px;color:#A3A39A;margin-left:16px">Aa Bb Cc 0123</span></div></div><div class="card" style="padding:28px 24px"><div class="label">Secondary — Data Font</div><p class="mono" style="font-size:32px;font-weight:700;color:#F5A623;margin:8px 0 4px;letter-spacing:.08em">JetBrains Mono</p><p style="font-size:13px;color:#A3A39A;line-height:1.6">Plate numbers only. Monospace, machined look. Always amber.</p><div class="mono" style="margin-top:16px;letter-spacing:.12em"><span style="font-size:14px;font-weight:700;color:#F5A623">B 1234 ABC</span><span style="font-size:14px;color:#A3A39A;margin-left:16px">L 5678 XY</span></div></div></div><div class="label">Dashboard Type Scale</div><div class="card mb-24">${[{l:'Page Title',s:'24px',w:600,x:'Revenue Overview',c:'#F5F5F0'},{l:'Section Header',s:'14px',w:600,x:'ACTIVE SESSIONS',c:'#A3A39A',u:1},{l:'Card Title',s:'16px',w:600,x:"Today's Revenue",c:'#F5F5F0'},{l:'Body Text',s:'14px',w:400,x:'3 vehicles in lane',c:'#A3A39A'},{l:'Table Cell',s:'13px',w:400,x:'2025-01-15 14:32',c:'#F5F5F0'},{l:'Label',s:'12px',w:500,x:'Last synced 30s ago',c:'#666660'}].map(z=>`<div class="divider" style="display:flex;align-items:baseline;gap:20px"><span style="font-size:11px;color:#666660;width:90px;flex-shrink:0;font-weight:500;text-transform:uppercase;letter-spacing:.06em">${z.l}</span><span style="font-size:${z.s};font-weight:${z.w};color:${z.c};${z.u?'text-transform:uppercase;letter-spacing:.1em':''}">${z.x}</span><span class="mono" style="font-size:11px;color:#666660;margin-left:auto;flex-shrink:0">${z.s}/${z.w}</span></div>`).join('')}</div><div class="label">Booth Touchscreen Scale</div><div class="card text-center" style="background:#000;border:.5px solid rgba(255,255,255,.12);padding:32px 24px"><div class="mono" style="font-size:48px;font-weight:700;color:#FFF;letter-spacing:.12em">B 1234 ABC</div><div style="font-size:18px;color:#A3A39A;margin-top:8px">Masuk 10:32 · 1 jam 47 menit</div><div style="font-size:64px;font-weight:700;color:#FFB830;margin-top:16px">Rp 5.000</div><div style="font-size:22px;color:#FFF;margin-top:12px">Scan QRIS atau tap kartu e-money</div></div>`,
booth:()=>`<div class="section-title"><h2>Booth Touchscreen UI</h2><p>7-inch 1024×600 — readable through a car window at arm's length.</p></div><div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap" id="boothBtns">${['idle','detecting','payment','confirmed','error'].map(s=>`<button class="booth-btn${s==='payment'?' active':''}" onclick="setBoothState('${s}')">${s}</button>`).join('')}</div><div class="card" style="padding:0;overflow:hidden;max-width:400px;margin:0 auto"><div style="background:#111;padding:8px 16px;display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:6px">${L(16)}<span style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#F5A623">SUPAPARK</span></div><span style="font-size:10px;color:#666660">Mall Grand Indonesia</span></div><div id="boothScreen" style="min-height:300px;display:flex;align-items:center;justify-content:center;transition:background .3s"></div></div><div class="mt-32"><div class="label">Booth Design Rules</div><div class="grid2">${['Min touch target: 80px','QR: min 240×240px, white bg','Font floor: 20px','No pure white areas (except QR)','Night mode = same (dark)','Screen: 7" 1024×600'].map(r=>`<div style="font-size:12px;color:#A3A39A;padding:8px 0;border-bottom:.5px solid rgba(255,255,255,.06)">${r}</div>`).join('')}</div></div>`,
dashboard:()=>{const rv=[32,45,38,56,42,61,55,48,72,65,58,80,75,68,92,85,78,95,88,72,68,90,82,76,98,92,86,102,95,88],mx=Math.max(...rv);return`<div class="section-title"><h2>Dashboard UI</h2><p>Dark, dense, data-rich — Vercel meets Bloomberg.</p></div><div class="label">Metric Cards</div><div class="grid4 mb-24">${[{l:"Today's Revenue",v:'Rp 2.4jt',d:'+12%',c:'#4ADE80'},{l:'Active Sessions',v:'47',d:'3 pending',c:'#A3A39A'},{l:'Occupancy',v:'72%',d:'28 free',c:'#A3A39A'},{l:'Lanes Online',v:'4/4',d:'All synced',c:'#4ADE80'}].map(m=>`<div class="card" style="padding:14px 16px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#666660;margin-bottom:8px">${m.l}</div><div style="font-size:28px;font-weight:700;color:#F5F5F0;font-variant-numeric:tabular-nums">${m.v}</div><div style="font-size:12px;font-weight:500;color:${m.c};margin-top:4px">${m.d}</div></div>`).join('')}</div><div class="label">Revenue (30 days)</div><div class="card mb-24" style="padding:16px 20px"><div style="display:flex;align-items:flex-end;gap:3px;height:120px">${rv.map(v=>`<div style="flex:1;background:#F5A623;border-radius:2px 2px 0 0;height:${(v/mx*100).toFixed(0)}%;opacity:${(.6+v/mx*.4).toFixed(2)}"></div>`).join('')}</div><div class="flex-between" style="margin-top:8px"><span style="font-size:11px;color:#666660">1 Mar</span><span style="font-size:11px;color:#666660">30 Mar</span></div></div><div class="label">Status Indicators</div><div class="card mb-24" style="padding:16px 20px"><div style="display:flex;flex-wrap:wrap;gap:10px">${[{t:'Online',c:'#22C55E'},{t:'Offline',c:'#EF4444'},{t:'Syncing...',c:'#F5A623'}].map(s=>`<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:${s.c}"><span style="width:8px;height:8px;border-radius:50%;background:${s.c}"></span>${s.t}</span>`).join('')}${[{t:'Open',c:'#22C55E'},{t:'Closed',c:'#666660'},{t:'Stuck',c:'#EF4444'},{t:'Paid',c:'#22C55E'},{t:'Pending',c:'#F5A623'},{t:'Override',c:'#3B82F6'},{t:'Failed',c:'#EF4444'}].map(s=>`<span class="pill" style="background:${s.c}18;color:${s.c}">${s.t}</span>`).join('')}</div></div><div class="label">Sessions Table</div><div class="card mb-24" style="padding:0;overflow:hidden"><table class="data-table"><thead><tr>${['Plate','Type','Entry','Duration','Fee','Payment','Status'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${[{p:'B 1234 ABC',t:'Car',e:'14:32',d:'1h 47m',f:'Rp 5.000',m:'QRIS',s:'Paid',c:'#22C55E'},{p:'D 5678 XY',t:'Moto',e:'15:10',d:'0h 32m',f:'Rp 2.000',m:'Flazz',s:'Paid',c:'#22C55E'},{p:'L 9012 ZZ',t:'Car',e:'15:45',d:'—',f:'—',m:'—',s:'Active',c:'#F5A623'}].map(r=>`<tr><td class="mono amber" style="font-size:12px;letter-spacing:.08em">${r.p}</td><td class="muted">${r.t}</td><td>${r.e}</td><td>${r.d}</td><td>${r.f}</td><td class="muted">${r.m}</td><td><span class="pill" style="background:${r.c}18;color:${r.c}">${r.s}</span></td></tr>`).join('')}</tbody></table></div><div class="label">Buttons</div><div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn btn-amber">Primary</button><button class="btn btn-red">Danger</button><button class="btn btn-secondary">Secondary</button><button class="btn btn-ghost">Ghost</button></div>`},
voice:()=>`<div class="section-title"><h2>Brand Voice</h2><p>Professional, direct, confidence-inspiring. Never casual.</p></div><div class="grid2 mb-24"><div class="card" style="padding:20px 24px"><div class="label">Tone Principles</div>${[{r:'Professional & Direct',d:"'Sesi Aktif' not 'Mobil yang Parkir'."},{r:'Bilingual ID/EN',d:'Booth = Bahasa. Dashboard = operator choice.'},{r:'Confidence-Inspiring',d:'Focus on uptime, offline, security.'},{r:'Operational',d:'No exclamation marks on status.'}].map(x=>`<div class="divider"><div style="font-size:13px;font-weight:600;color:#F5A623">${x.r}</div><div style="font-size:12px;color:#A3A39A;margin-top:2px">${x.d}</div></div>`).join('')}</div><div class="card" style="padding:20px 24px"><div class="label">Language Rules</div>${[{c:'Booth',r:'Always Bahasa'},{c:'Attendant tablet',r:'Always Bahasa'},{c:'Dashboard',r:'EN/ID toggle'},{c:'WhatsApp receipts',r:'Always Bahasa'},{c:'Alerts',r:"Operator's setting"},{c:'Indonesian style',r:'Conversational, not formal'}].map(l=>`<div class="divider flex-between"><span style="font-size:12px;color:#A3A39A">${l.c}</span><span style="font-size:12px;font-weight:600;color:#F5F5F0">${l.r}</span></div>`).join('')}</div></div><div class="label">String Examples (EN / ID)</div><div class="card">${[{e:'Gate Open',i:'Portal Terbuka'},{e:'Gate Stuck — Alert Sent',i:'Portal Macet — Notifikasi Terkirim'},{e:'Payment Confirmed',i:'Pembayaran Diterima'},{e:'Awaiting Payment',i:'Menunggu Pembayaran'},{e:'Valid Member',i:'Member Aktif'},{e:'Pass Expired',i:'Pass Kadaluarsa'},{e:"Today's Revenue",i:'Pendapatan Hari Ini'}].map(s=>`<div class="divider" style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><span style="font-size:13px;color:#F5F5F0">${s.e}</span><span style="font-size:13px;color:#F5A623">${s.i}</span></div>`).join('')}</div>`,
gtm:()=>`<div class="section-title"><h2>Go-to-Market Strategy</h2><p>Sell ROI, not tech. Demo is believing. Aldo is the brand.</p></div><div class="grid3 mb-24">${[{l:'A',n:'Anti-Leakage Pitch',c:'#F5A623',t:['5-page ROI pitch deck','WhatsApp Business catalog','"100 cars × Rp 2k = Rp 6jt/mo lost"']},{l:'B',n:'Demo is Believing',c:'#22C55E',t:['Mobile demo rig','Live ANPR + QRIS in 2 min','90s case study video']},{l:'C',n:'Aldo as Brand',c:'#3B82F6',t:['"Installed by Aldo" badge','SLA: 24h hardware swap','Commodity parts']}].map(s=>`<div class="card" style="border-top:3px solid ${s.c};padding:20px 18px"><div style="font-size:11px;font-weight:600;color:${s.c};margin-bottom:4px">STRATEGY ${s.l}</div><div style="font-size:16px;font-weight:600;color:#F5F5F0;margin-bottom:12px">${s.n}</div>${s.t.map(x=>`<div class="divider" style="font-size:12px;color:#A3A39A;line-height:1.5">${x}</div>`).join('')}</div>`).join('')}</div><div class="label">Competitor Positioning</div><div class="card mb-24" style="padding:0;overflow:hidden"><table class="data-table" style="font-size:12px"><thead><tr>${['','Enterprise','Manual','SupaPark'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${[{m:'Setup Cost',e:'Rp 100jt+',n:'Rp 1-2jt',s:'Rp 8-10jt'},{m:'Monthly',e:'High SaaS',n:'Staff salary',s:'Minimal'},{m:'Fraud Risk',e:'Low',n:'Very High',s:'Zero'},{m:'Offline',e:'No',n:'N/A',s:'Full'},{m:'ANPR',e:'Yes',n:'No',s:'Yes'},{m:'Visibility',e:'Limited',n:'None',s:'Real-time'},{m:'Repair',e:'Days-weeks',n:'N/A',s:'24h'}].map(r=>`<tr><td style="font-weight:600;color:#A3A39A">${r.m}</td><td class="hint">${r.e}</td><td class="hint">${r.n}</td><td style="color:#F5A623;font-weight:600">${r.s}</td></tr>`).join('')}</tbody></table></div><div class="label">Marketing Budget (Bootstrap)</div><div class="card">${[{i:'Domain (supapark.id)',c:'Rp 250k/yr'},{i:'Branding kit',c:'Rp 500k'},{i:'Pitch printing',c:'Rp 500k'},{i:'Demo rig',c:'Rp 1.5jt'},{i:'Digital/hosting',c:'Rp 1jt'},{i:'Total',c:'Rp 3.75jt',b:1}].map(b=>`<div class="divider flex-between"><span style="font-size:13px;color:${b.b?'#F5F5F0':'#A3A39A'};font-weight:${b.b?700:400}">${b.i}</span><span class="mono" style="font-size:13px;color:${b.b?'#F5A623':'#F5F5F0'};font-weight:${b.b?700:400}">${b.c}</span></div>`).join('')}</div>`,
timeline:()=>`<div class="section-title"><h2>Launch Timeline</h2><p>Alpha to regional scaling — 12-month roadmap.</p></div><div class="grid4 mb-24">${[{n:'I',nm:'Alpha',d:'Weeks 1–4',c:'#F5A623',f:'Technical Validation',it:['Finalize logo & assets','Setup WhatsApp Business','One-pager pitch PDF','Benchmark ANPR']},{n:'II',nm:'Pilot',d:'Weeks 5–12',c:'#22C55E',f:'Pilot Install (2 sites)',it:['Film install timelapse','Case Study 1 (leakage)','Booth photography','Validate hardware']},{n:'III',nm:'Launch',d:'Months 3–6',c:'#3B82F6',f:'Jabodetabek Outreach',it:['Landing page (supapark.id)','LinkedIn outreach','Mobile demo unit','50 qualified leads']},{n:'IV',nm:'Growth',d:'Months 6–12',c:'#A855F7',f:'Regional Scaling',it:['Case Study 2 (campus)','IG/FB ads Banten/JKT','10 paid installations','Expand beyond Jabodtbk']}].map(p=>`<div class="card" style="border-top:3px solid ${p.c};padding:20px 18px"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:${p.c}">PHASE ${p.n}</span><span style="font-size:14px;font-weight:600;color:#F5F5F0">${p.nm}</span></div><div style="font-size:11px;color:#666660;margin-bottom:12px">${p.d}</div><div style="font-size:12px;font-weight:600;color:#A3A39A;margin-bottom:8px">${p.f}</div>${p.it.map(i=>`<div class="divider" style="font-size:12px;color:#A3A39A;line-height:1.5">${i}</div>`).join('')}</div>`).join('')}</div><div class="label">Marketing Objectives</div><div class="grid3 mb-24">${[{t:'Months 1–3',o:'2 pilot sites',m:'ANPR 95%+, Rp 8jt hardware',c:'#F5A623'},{t:'Months 3–6',o:'50 leads',m:'Jabodetabek / Banten',c:'#22C55E'},{t:'Months 6–12',o:'10 installs',m:'Hardware + SaaS revenue',c:'#3B82F6'}].map(o=>`<div class="card" style="padding:16px 18px;border-left:3px solid ${o.c}"><div style="font-size:11px;font-weight:600;color:#666660;text-transform:uppercase;letter-spacing:.08em">${o.t}</div><div style="font-size:20px;font-weight:700;color:${o.c};margin:8px 0 4px">${o.o}</div><div style="font-size:12px;color:#A3A39A;line-height:1.5">${o.m}</div></div>`).join('')}</div><div class="label">Design — What NOT to Do</div><div class="card mb-24"><div class="grid2">${['No gradients on surfaces','No count-up animations','No corners > 12px','No serif fonts','No pastel colors','No white backgrounds','No tooltips on booth','No targets < 56px tablet','No spinners (skeleton only)','No "loading..." text'].map(d=>`<div class="divider" style="display:flex;align-items:center;gap:8px"><span style="color:#EF4444;font-size:12px;font-weight:700;flex-shrink:0">✕</span><span style="font-size:12px;color:#A3A39A">${d}</span></div>`).join('')}</div></div><div class="text-center" style="margin-top:56px;padding:32px 0;border-top:.5px solid rgba(255,255,255,.06)">${L(32)}<p style="font-size:12px;font-weight:700;letter-spacing:.15em;color:#F5A623;margin-top:8px">SUPAPARK</p><p style="font-size:11px;color:#666660;margin-top:4px">Brand Book v1.0 — 2025</p><p style="font-size:11px;color:#666660">Smart Parking System — Built for Indonesia</p></div>`
};
const BS={
idle:{bg:'#000',h:`<div class="text-center" style="padding:40px 0">${L(64)}<p style="font-size:14px;font-weight:600;letter-spacing:.15em;color:#F5A623;margin-top:12px">SUPAPARK</p><p style="font-size:16px;color:#A3A39A;margin-top:8px">Mall Grand Indonesia</p></div>`},
detecting:{bg:'#0A1A0A',h:`<div class="text-center" style="padding:40px 0"><div style="font-size:24px;font-weight:600;color:#FFF">Membaca plat kendaraan...</div><div style="width:60%;height:3px;background:linear-gradient(90deg,transparent,#00FF88,transparent);margin:20px auto;border-radius:2px"></div></div>`},
payment:{bg:'#000',h:`<div style="padding:12px 20px"><div class="text-center"><div class="mono" style="font-size:36px;font-weight:700;color:#FFF;letter-spacing:.12em">B 1234 ABC</div><div style="font-size:14px;color:#A3A39A;margin-top:4px">Masuk 10:32 · 1 jam 47 menit</div><div style="font-size:52px;font-weight:700;color:#FFB830;margin:16px 0 12px">Rp 5.000</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px"><div style="background:#FFF;border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:center"><div style="width:100px;height:100px;background:repeating-conic-gradient(#000 0% 25%,#fff 0% 50%) 50%/14px 14px;border-radius:4px"></div></div><div style="background:#F5A623;border-radius:8px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:20px;font-weight:600;color:#0A0A0A">TAP KARTU</div><div style="font-size:13px;color:#0A0A0A;opacity:.7;margin-top:4px">Flazz / e-money</div></div></div><div class="text-center" style="margin-top:12px"><div style="font-size:14px;color:#A3A39A">Scan QRIS atau tap kartu</div><div style="font-size:18px;font-weight:700;color:#FFB830;margin-top:8px">02:47 tersisa</div></div></div>`},
confirmed:{bg:'#052E16',h:`<div class="text-center" style="padding:40px 0"><div style="width:64px;height:64px;border-radius:50%;background:#22C55E;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:32px;color:#fff">✓</div><div style="font-size:28px;font-weight:700;color:#FFF;margin-top:16px">Terima kasih!</div><div style="font-size:14px;color:#A3A39A;margin-top:8px">B 1234 ABC · Rp 5.000 · QRIS</div></div>`},
error:{bg:'#2D0808',h:`<div class="text-center" style="padding:40px 0"><div style="font-size:32px;font-weight:700;color:#FF3B3B">Portal Macet</div><div style="font-size:16px;color:#FFF;margin-top:12px">Hubungi petugas: 0812-3456-7890</div><div style="display:inline-block;background:#EF4444;border-radius:8px;padding:12px 24px;margin-top:16px"><span style="font-size:14px;font-weight:600;color:#fff">Masukkan Kode Override</span></div></div>`}
};
function setBoothState(s){const x=BS[s];if(!x)return;const sc=document.getElementById('boothScreen');if(sc){sc.style.background=x.bg;sc.innerHTML=x.h}document.querySelectorAll('#boothBtns .booth-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase()===s))}
render();
